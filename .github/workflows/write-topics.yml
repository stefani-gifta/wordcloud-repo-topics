name: Add topic word cloud

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate word cloud
        uses: stefani-gifta/wordcloud-repo-topics@main
        with:
          token: ${{ secrets.WORDCLOUD_TOKEN }}
          svg_width: '680'
          svg_height: '400'
          min_font_size: '14'
          max_font_size: '20'
          color: '0075ca'
          output_file: 'topics.svg'